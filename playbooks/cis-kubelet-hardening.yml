---
# CIS k3s-cis-1.7 kubelet hardening — creates /var/lib/kubelet/config.yaml at the
# path kube-bench scans (kube-bench looks for /var/lib/kubelet/config.yaml, not the
# k3s-internal kubelet.conf.d path). k3s is then told to load this file via
# kubelet-arg: config=... so the same file governs both compliance scanning and the
# actual kubelet runtime.
#
# Addresses: 4.1.3, 4.1.7, 4.2.4, 4.2.5, 4.2.8, 4.2.10, 4.2.11, 4.2.12, 4.2.13
- name: CIS kubelet hardening for k3s nodes
  hosts: cluster
  gather_facts: false
  become: true

  vars:
    kubelet_config_dir: /var/lib/kubelet
    kubelet_config_path: /var/lib/kubelet/config.yaml
    k3s_config_path: /etc/rancher/k3s/config.yaml
    kube_bench_cfg_dir: /opt/kube-bench/cfg
    kube_bench_version: "0.8.0"

  tasks:
    - name: Create /var/lib/kubelet directory
      ansible.builtin.file:
        path: "{{ kubelet_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Write CIS-hardened kubelet config
      ansible.builtin.copy:
        dest: "{{ kubelet_config_path }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          apiVersion: kubelet.config.k8s.io/v1beta1
          kind: KubeletConfiguration
          # 4.2.4 — read-only port disabled
          readOnlyPort: 0
          # 4.2.5 — streaming idle timeout (not 0)
          streamingConnectionIdleTimeout: 5m0s
          # 4.2.8 — event QPS (>= 0, explicit)
          eventRecordQPS: 5
          # 4.2.10 — certificate rotation
          rotateCertificates: true
          # 4.2.11 — kubelet server cert rotation
          featureGates:
            RotateKubeletServerCertificate: true
          # 4.2.12 — strong TLS ciphers only
          tlsCipherSuites:
            - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
            - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
            - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
            - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
            - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
            - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
          # 4.2.13 — pod PID limit
          podPidsLimit: 1024
      notify: restart k3s

    - name: Ensure /etc/rancher/k3s/config.yaml loads the hardened kubelet config
      ansible.builtin.blockinfile:
        path: "{{ k3s_config_path }}"
        create: true
        owner: root
        group: root
        mode: "0600"
        marker: "# {mark} CIS kubelet hardening"
        block: |
          kubelet-arg:
            - "config={{ kubelet_config_path }}"
      notify: restart k3s

    - name: Deploy kube-bench binary
      ansible.builtin.get_url:
        url: "https://github.com/aquasecurity/kube-bench/releases/download/v{{ kube_bench_version }}/kube-bench_{{ kube_bench_version }}_linux_amd64.tar.gz"
        dest: /tmp/kube-bench.tar.gz
        mode: "0644"

    - name: Extract kube-bench binary and cfg
      ansible.builtin.unarchive:
        src: /tmp/kube-bench.tar.gz
        dest: /tmp
        remote_src: true

    - name: Install kube-bench to /usr/local/bin
      ansible.builtin.copy:
        src: /tmp/kube-bench
        dest: /usr/local/bin/kube-bench
        owner: root
        group: root
        mode: "0755"
        remote_src: true

    - name: Create kube-bench cfg directory
      ansible.builtin.file:
        path: "{{ kube_bench_cfg_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Sync kube-bench cfg from extracted tarball
      ansible.builtin.copy:
        src: /tmp/cfg/
        dest: "{{ kube_bench_cfg_dir }}/"
        owner: root
        group: root
        mode: preserve
        remote_src: true

    - name: Deploy patched k3s-cis-1.7 kube-bench config (bins + confs for k3s-agent)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../kube-bench-cfg/k3s-cis-1.7/config.yaml"
        dest: "{{ kube_bench_cfg_dir }}/k3s-cis-1.7/config.yaml"
        owner: root
        group: root
        mode: "0644"

    - name: Deploy patched k3s-cis-1.7 node.yaml (fixes journalctl unit + stat format)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../kube-bench-cfg/k3s-cis-1.7/node.yaml"
        dest: "{{ kube_bench_cfg_dir }}/k3s-cis-1.7/node.yaml"
        owner: root
        group: root
        mode: "0644"

    - name: Fix proxy kubeconfig permissions (4.1.3)
      ansible.builtin.file:
        path: /var/lib/rancher/k3s/agent/kubeproxy.kubeconfig
        owner: root
        group: root
        mode: "0600"
      failed_when: false

    - name: Fix client CA cert permissions (4.1.7)
      ansible.builtin.file:
        path: /var/lib/rancher/k3s/agent/client-ca.crt
        owner: root
        group: root
        mode: "0600"
      failed_when: false

  handlers:
    - name: restart k3s
      ansible.builtin.systemd:
        name: "{{ 'k3s' if inventory_hostname in groups['control_plane'] else 'k3s-agent' }}"
        state: restarted
        daemon_reload: true
