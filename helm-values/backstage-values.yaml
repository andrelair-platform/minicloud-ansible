# Backstage values for minicloud Phase 18.
# Off-the-shelf image (ghcr.io/backstage/backstage:latest), Postgres
# subchart enabled in standalone mode, app-config inlined as a ConfigMap.

backstage:
  replicas: 1

  image:
    # ghcr.io is routed through Harbor's ghcr proxy (Phase 16) automatically
    # via the cluster's registries.yaml mirror; nothing to override here.
    registry: ghcr.io
    repository: backstage/backstage
    # Pinned 2026-06-15: ":latest" was hitting
    # NotImplementedError: No implementation available for apiRef{plugin.notifications.service}
    # The notifications plugin shipped in the off-the-shelf frontend bundle
    # without the backend wiring. Fixed upstream in 1.49.0 via a no-op
    # fallback. Picking 1.51.2 (latest published tag at time of pin) so we
    # also pick up subsequent fixes and avoid future "latest" drift.
    tag: "1.51.2"

  resources:
    requests: { cpu: 100m, memory: 384Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

  # Backstage's port (default 7007 in the off-the-shelf image)
  containerPorts:
    backend: 7007

  # Inline app-config — guest auth + 5 catalog locations targeting our
  # GitHub repos. Each repo has a catalog-info.yaml at its root.
  appConfig:
    app:
      title: minicloud platform
      baseUrl: https://backstage.10.0.0.200.nip.io
    organization:
      name: andrelair-platform
    backend:
      baseUrl: https://backstage.10.0.0.200.nip.io
      listen:
        port: 7007
      cors:
        origin: https://backstage.10.0.0.200.nip.io
        methods: [GET, POST, PUT, DELETE]
        credentials: true
      # URL whitelist for catalog locations and other reading. Without
      # this, raw.githubusercontent.com is blocked by default policy.
      reading:
        allow:
          - host: raw.githubusercontent.com
          - host: github.com
      database:
        client: pg
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
      auth:
        # Backend-to-frontend auth secret. The chart auto-generates one
        # if not provided; we let it.
        keys: []
    auth:
      # Guest auth: anyone hitting the UI gets logged in automatically.
      # Real SSO (Keycloak/GitHub) deferred to a future phase.
      # The "dangerously" flag is required because the off-the-shelf
      # image runs NODE_ENV=production, where guest is gated by default.
      # Acceptable here: the Backstage instance is internal-only via
      # the cluster's TLS Ingress on a private nip.io hostname, and
      # the catalog contains no sensitive data (just public repo metadata).
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true
    catalog:
      rules:
        - allow: [Component, System, API, Resource, Location]
      locations:
        # Use raw.githubusercontent.com for direct (anonymous, no rate-limit
        # surprises) file fetches. Backstage's `url` location reader handles
        # this URL pattern natively without needing the GitHub integration.
        - type: url
          target: https://raw.githubusercontent.com/andrelair-platform/minicloud-platform-docs/main/catalog-info.yaml
        - type: url
          target: https://raw.githubusercontent.com/andrelair-platform/minicloud-ansible/main/catalog-info.yaml
        - type: url
          target: https://raw.githubusercontent.com/andrelair-platform/minicloud-opentofu/main/catalog-info.yaml
        - type: url
          target: https://raw.githubusercontent.com/andrelair-platform/minicloud-gitops/main/catalog-info.yaml
        - type: url
          target: https://raw.githubusercontent.com/andrelair-platform/platform-demo/main/catalog-info.yaml

  extraEnvVars:
    - name: POSTGRES_HOST
      value: backstage-postgresql
    - name: POSTGRES_PORT
      value: "5432"
    - name: POSTGRES_USER
      value: bn_backstage
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: backstage-postgres-secret
          key: password

# Disable the chart's Ingress — we'll add our own with cert-manager TLS.
ingress:
  enabled: false

# Postgres subchart, standalone, on Longhorn
postgresql:
  enabled: true
  # Workaround for the bitnami chart 35164 image migration (chart default
  # but we make it explicit for portfolio clarity)
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql

  architecture: standalone

  auth:
    username: bn_backstage
    database: backstage_plugin_catalog
    existingSecret: backstage-postgres-secret
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password

  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 1Gi
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
