# Open WebUI values — AI Gateway phase.
# Routes through LiteLLM proxy (OpenAI-compatible) instead of direct Ollama.
# Backed by PostgreSQL (ai namespace) instead of SQLite.

ollama:
  enabled: false

# Disable direct Ollama URLs — LiteLLM is the only backend.
ollamaUrls: []
ollamaUrlsFromExtraEnv: false

# LiteLLM AI Gateway endpoint (OpenAI-compatible API).
openaiBaseApiUrl: "http://litellm.ai.svc.cluster.local:4000/v1"

# OPENAI_API_KEY pulled from litellm-credentials Secret (ESO-synced from Vault).
openaiApiKeyExistingSecret: "litellm-credentials"
openaiApiKeyExistingSecretKey: "master-key"

# PostgreSQL database URL constructed via chart's databaseUrl field.
# Full URL with credentials embedded — secret is referenced via extraEnvVars.
databaseUrl: ""

pipelines:
  enabled: false

tika:
  enabled: false

websocket:
  enabled: false

redis-cluster:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1500Mi

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

persistence:
  enabled: true
  size: 5Gi
  storageClass: longhorn
  accessModes: [ReadWriteOnce]

ingress:
  enabled: false

service:
  type: ClusterIP
  port: 80
  containerPort: 8080

extraEnvVars:
  - name: WEBUI_NAME
    value: "minicloud chat"
  - name: DEFAULT_MODELS
    value: "phi4-mini"
  # ── Web Search (real-time internet via SearXNG) ─────────────────────
  - name: ENABLE_WEB_SEARCH
    value: "true"
  - name: WEB_SEARCH_ENGINE
    value: "searxng"
  - name: SEARXNG_QUERY_URL
    value: "http://searxng.searxng.svc.cluster.local:8080/search?q=<query>&format=json&language=auto"
  - name: WEB_SEARCH_RESULT_COUNT
    value: "5"
  - name: WEB_SEARCH_CONCURRENT_REQUESTS
    value: "10"
  - name: ENABLE_API_KEY
    value: "true"
  - name: USER_PERMISSIONS_WORKSPACE_MODELS_ACCESS
    value: "true"
  - name: WEBUI_URL
    value: "https://chat.devandre.sbs"
  - name: ENABLE_OAUTH_SIGNUP
    value: "true"
  - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
    value: "true"
  - name: OAUTH_PROVIDER_NAME
    value: "Authentik"
  - name: OPENID_PROVIDER_URL
    value: "https://auth.devandre.sbs/application/o/open-webui/.well-known/openid-configuration"
  - name: OAUTH_SCOPES
    value: "openid email profile groups"
  - name: ENABLE_OAUTH_ROLE_MANAGEMENT
    value: "true"
  - name: OAUTH_ROLES_CLAIM
    value: "groups"
  - name: OAUTH_ALLOWED_ROLES
    value: "authentik Admins,Users"
  - name: OAUTH_ADMIN_ROLES
    value: "authentik Admins"
  # DATABASE_URL via env var composition: PG_PASSWORD from ESO secret,
  # rest of URL is static. Kubernetes substitutes $(PG_PASSWORD) at pod start.
  - name: PG_PASSWORD
    valueFrom:
      secretKeyRef:
        name: ai-postgresql-secret
        key: password
  - name: DATABASE_URL
    value: "postgresql://aiplatform:$(PG_PASSWORD)@postgresql-ai.ai.svc.cluster.local:5432/openwebui"

  # ── RAG / Vector Search (pgvector) ──────────────────────────────────────
  # Vector store: pgvector on the existing postgresql-ai instance (ragdb database).
  - name: VECTOR_DB
    value: "pgvector"
  - name: PGVECTOR_DB_URL
    value: "postgresql://aiplatform:$(PG_PASSWORD)@postgresql-ai.ai.svc.cluster.local:5432/ragdb"
  # Embedding model: nomic-embed-text via Ollama (274MB, 768-dim).
  - name: RAG_EMBEDDING_ENGINE
    value: "ollama"
  - name: RAG_EMBEDDING_MODEL
    value: "nomic-embed-text"
  - name: RAG_OLLAMA_BASE_URL
    value: "http://ollama.ai.svc.cluster.local:11434"
  - name: CHUNK_SIZE
    value: "1500"
  - name: CHUNK_OVERLAP
    value: "200"
  - name: RAG_TOP_K
    value: "5"
  - name: ENABLE_RAG_HYBRID_SEARCH
    value: "true"
  - name: VECTOR_LENGTH
    value: "768"
  - name: PGVECTOR_INITIALIZE_MAX_VECTOR_LENGTH
    value: "768"
  - name: PGVECTOR_INDEX_METHOD
    value: "hnsw"
  - name: PGVECTOR_HNSW_M
    value: "16"
  - name: PGVECTOR_HNSW_EF_CONSTRUCTION
    value: "64"
  - name: SSL_CERT_FILE
    value: /ca-bundle/bundle.crt

extraEnvFrom:
  - secretRef:
      name: openwebui-oidc

extraInitContainers:
  - name: inject-minicloud-ca
    image: ghcr.io/open-webui/open-webui:0.9.4
    command: ["/bin/sh", "-c"]
    args:
      - cat /etc/ssl/certs/ca-certificates.crt /minicloud-ca/ca.crt > /ca-bundle/bundle.crt
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
    volumeMounts:
      - name: minicloud-ca
        mountPath: /minicloud-ca
      - name: ca-bundle
        mountPath: /ca-bundle

volumes:
  - name: minicloud-ca
    configMap:
      name: minicloud-ca
  - name: ca-bundle
    emptyDir: {}

volumeMounts:
  container:
    - name: ca-bundle
      mountPath: /ca-bundle
  initContainer:
    - name: minicloud-ca
      mountPath: /minicloud-ca
    - name: ca-bundle
      mountPath: /ca-bundle
