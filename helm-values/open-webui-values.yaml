# Open WebUI values for minicloud Phase 19.
# Talks to the Ollama service we already installed (cluster-internal).

# Disable the chart's bundled Ollama subchart — we have our own
# (otwld/ollama installed separately in the same `ai` namespace).
ollama:
  enabled: false

# Point at the existing Ollama service via cluster DNS.
ollamaUrls:
  - http://ollama.ai.svc:11434

# Disable the Pipelines feature (extra plugins server) — not needed for
# Phase 19. Adds memory + complexity if enabled.
pipelines:
  enabled: false

# Disable RAG document parser sidecars — they're optional
tika:
  enabled: false

websocket:
  enabled: false

redis-cluster:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    # Open WebUI bundles sentence-transformers and embedding models for
    # RAG; startup needs 700-900 MiB before any chat traffic. 512 MiB
    # OOMKills it during init. 1.5 GiB gives comfortable headroom.
    memory: 1500Mi

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# SQLite-backed (default) — no external Postgres needed for single-user demo.
# Persistence holds chat history, RAG embeddings, user settings.
persistence:
  enabled: true
  size: 5Gi
  storageClass: longhorn
  accessModes: [ReadWriteOnce]

# Disable chart's Ingress — we add our own with cert-manager TLS.
ingress:
  enabled: false

service:
  type: ClusterIP
  port: 80
  containerPort: 8080

# Phase 23 Stage 5 — Authentik OIDC integration.
# Open WebUI 0.4+ supports OAuth2/OIDC natively via env vars.
# - OAUTH_CLIENT_ID + OAUTH_CLIENT_SECRET injected from the openwebui-oidc
#   Secret (out-of-band, created via kubectl)
# - OAUTH_PROVIDER_NAME determines the button label on the login page
# - ENABLE_OAUTH_SIGNUP=true means SSO users get auto-provisioned
#   accounts on first login (matches the "auto-onboard" pattern used by
#   Harbor + Grafana)
# - Local admin signup-flow is preserved as emergency fallback (the
#   first-signed-up user is the admin; subsequent local signups require
#   admin approval).
extraEnvVars:
  - name: WEBUI_NAME
    value: "minicloud chat"
  - name: DEFAULT_MODELS
    value: "phi3-financial:latest"
  - name: ENABLE_API_KEY
    value: "true"
  - name: USER_PERMISSIONS_WORKSPACE_MODELS_ACCESS
    value: "true"
  - name: WEBUI_URL
    value: "https://chat.devandre.sbs"
  - name: ENABLE_OAUTH_SIGNUP
    value: "true"
  - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
    value: "true"
  - name: OAUTH_PROVIDER_NAME
    value: "Authentik"
  - name: OPENID_PROVIDER_URL
    value: "https://auth.devandre.sbs/application/o/open-webui/.well-known/openid-configuration"
  - name: OAUTH_SCOPES
    value: "openid email profile groups"
  # Optional: map Authentik 'authentik Admins' group claim -> Open WebUI admin role
  - name: ENABLE_OAUTH_ROLE_MANAGEMENT
    value: "true"
  - name: OAUTH_ROLES_CLAIM
    value: "groups"
  - name: OAUTH_ALLOWED_ROLES
    value: "authentik Admins,Users"
  - name: OAUTH_ADMIN_ROLES
    value: "authentik Admins"
  # Minicloud CA is not in the container's default trust store.
  # SSL_CERT_FILE points to a combined bundle built by the init container below.
  - name: SSL_CERT_FILE
    value: /ca-bundle/bundle.crt

# OAUTH_CLIENT_ID + OAUTH_CLIENT_SECRET come from this Secret
# (created out-of-band so they don't live in this YAML or in git).
extraEnvFrom:
  - secretRef:
      name: openwebui-oidc

# Init container concatenates system CAs + minicloud CA into one bundle.
# The main container inherits SSL_CERT_FILE pointing to it.
extraInitContainers:
  - name: inject-minicloud-ca
    image: ghcr.io/open-webui/open-webui:0.9.4
    command: ["/bin/sh", "-c"]
    args:
      - cat /etc/ssl/certs/ca-certificates.crt /minicloud-ca/ca.crt > /ca-bundle/bundle.crt
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
    volumeMounts:
      - name: minicloud-ca
        mountPath: /minicloud-ca
      - name: ca-bundle
        mountPath: /ca-bundle

volumes:
  - name: minicloud-ca
    configMap:
      name: minicloud-ca
  - name: ca-bundle
    emptyDir: {}

volumeMounts:
  container:
    - name: ca-bundle
      mountPath: /ca-bundle
  initContainer:
    - name: minicloud-ca
      mountPath: /minicloud-ca
    - name: ca-bundle
      mountPath: /ca-bundle
