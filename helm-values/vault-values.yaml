injector:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

server:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  serviceAccount:
    create: true

  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "raft" {
        path    = "/vault/data"
        node_id = "vault-0"
      }

      service_registration "kubernetes" {}

  ha:
    enabled: false

  dataStorage:
    enabled: true
    size: 5Gi
    storageClass: longhorn
    accessMode: ReadWriteOnce

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.org/proxy-connect-timeout: "30s"
      nginx.org/proxy-read-timeout: "30s"
    hosts:
      - host: vault.10.0.0.200.nip.io
        paths:
          - /
      - host: vault.devandre.sbs
        paths:
          - /
    tls:
      - hosts:
          - vault.10.0.0.200.nip.io
          - vault.devandre.sbs
        secretName: vault-tls

ui:
  enabled: true
  serviceType: ClusterIP
