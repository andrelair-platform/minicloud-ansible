# Authentik values for minicloud Phase 23 — SSO + IAM.
# Single-replica server + worker, Postgres on Longhorn.
#
# IMPORTANT — secret substitution:
# This file uses placeholders for sensitive values. Real values live in
# mode-600 files under /home/ktayl/.authentik-*. The deployment workflow:
#
#   SECRET_KEY=$(cat ~/.authentik-secret-key)
#   PG_PASSWORD=$(cat ~/.authentik-postgres)
#   sed -e "s|{{SECRET_KEY}}|${SECRET_KEY}|" \
#       -e "s|{{POSTGRES_PASSWORD}}|${PG_PASSWORD}|" \
#       authentik-values.yaml > /tmp/authentik-values-rendered.yaml
#   chmod 600 /tmp/authentik-values-rendered.yaml
#   helm install authentik authentik/authentik --version 2026.5.3 \
#     -n authentik -f /tmp/authentik-values-rendered.yaml
#
# (Why not the chart's `existingSecret.secretName` field? Because setting
# it makes the chart skip auto-creating the env-var ConfigMap/Secret,
# which means non-secret postgresql.host/port/name/user also fail to
# inject. Inline substitution into the rendered file is the most
# reliable path until the upstream chart fixes that behavior.)
#
# Image source: ghcr.io/goauthentik/server — routed through Phase 16
# Harbor ghcr proxy automatically via the cluster's registries.yaml mirror.
# Authentik 2026.5.x has no Redis subchart (embedded cache).

authentik:
  log_level: info

  # Persistent cookie-signing key — DO NOT change after first install
  # (would invalidate every active session). Generated once via
  # `openssl rand -base64 32 > ~/.authentik-secret-key`.
  secret_key: "{{SECRET_KEY}}"

  postgresql:
    host: "authentik-postgresql"
    name: "authentik"
    user: "authentik"
    password: "{{POSTGRES_PASSWORD}}"
    port: 5432

  error_reporting:
    enabled: false   # portfolio: no telemetry to upstream

# Authentik server (HTTP API + admin UI). 1 replica fine for portfolio scale.
server:
  enabled: true
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 384Mi }
    limits:   { cpu: 1000m, memory: 768Mi }
  ingress:
    enabled: false   # we add our own with cert-manager TLS — see ../../authentik-ingress.yaml
  # Bootstrap admin (one-time use; rotate to MFA-enrolled account after first login).
  # The authentik-bootstrap Secret is created out-of-band:
  #   kubectl -n authentik create secret generic authentik-bootstrap \
  #     --from-literal=AUTHENTIK_BOOTSTRAP_PASSWORD="$(cat ~/.authentik-bootstrap-password)" \
  #     --from-literal=AUTHENTIK_BOOTSTRAP_TOKEN="$(cat ~/.authentik-bootstrap-token)" \
  #     --from-literal=AUTHENTIK_BOOTSTRAP_EMAIL="kanmegnea@gmail.com"
  envFrom:
    - secretRef:
        name: authentik-bootstrap

# Authentik worker (background tasks: blueprint apply, email, periodic policies)
worker:
  enabled: true
  replicas: 1
  resources:
    requests: { cpu: 50m,  memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  envFrom:
    - secretRef:
        name: authentik-bootstrap

# Bitnami PostgreSQL subchart. Chart default uses library/postgres,
# NOT bitnami/postgresql — so no AGPL licensing gotcha.
postgresql:
  enabled: true
  global:
    security:
      allowInsecureImages: true
  auth:
    # Out-of-band Secret carrying postgres-password + password keys.
    # Created via:
    #   kubectl -n authentik create secret generic authentik-postgres-secret \
    #     --from-literal=postgres-password="$(cat ~/.authentik-postgres)" \
    #     --from-literal=password="$(cat ~/.authentik-postgres)"
    existingSecret: authentik-postgres-secret
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
    username: authentik
    database: authentik
  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 1Gi
    resources:
      requests: { cpu: 50m,  memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
