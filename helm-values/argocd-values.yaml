global:
  domain: argocd.10.0.0.200.nip.io

# Phase 15: TLS terminated at the NGINX Ingress, cert from cert-manager.
# Keep server.insecure: true so argocd-server speaks plain HTTP internally
# (the cluster traffic Ingress -> argocd-server stays inside the cluster);
# the public-facing TLS handshake happens at the Ingress.
configs:
  params:
    server.insecure: true
  cm:
    # Enable resource exclusions / inclusions later if needed
    timeout.reconciliation: 180s
    # Disable local admin — OIDC (Authentik) is the only login path.
    # Break-glass: kubectl --context minicloud-break-glass + kubectl exec into argocd-server.
    admin.enabled: "false"
    # Phase 23 Stage 3 — Authentik OIDC integration
    url: https://argocd.devandre.sbs
    oidc.config: |
      name: Authentik
      issuer: https://auth.10.0.0.200.nip.io/application/o/argo-cd/
      clientID: gKTS6lKgXhvP2t2rlUu8QhkzFo2itrY8c3szNv9M
      clientSecret: $argocd-oidc:clientSecret
      requestedScopes: ["openid", "profile", "email", "groups"]
      requestedIDTokenClaims:
        groups:
          essential: true
      rootCA: |
        -----BEGIN CERTIFICATE-----
        MIICAzCCAaigAwIBAgIUXS8lZg8k9yh42Gyd7EBDeQpvrnAwCgYIKoZIzj0EAwIw
        XzEbMBkGA1UEChMSYW5kcmVsYWlyLXBsYXRmb3JtMRswGQYDVQQLExJtaW5pY2xv
        dWQgcGxhdGZvcm0xIzAhBgNVBAMTGm1pbmljbG91ZCBJbnRlcm5hbCBSb290IENB
        MB4XDTI2MDUwOTExNTY0NloXDTM2MDUwNjExNTY0NlowXzEbMBkGA1UEChMSYW5k
        cmVsYWlyLXBsYXRmb3JtMRswGQYDVQQLExJtaW5pY2xvdWQgcGxhdGZvcm0xIzAh
        BgNVBAMTGm1pbmljbG91ZCBJbnRlcm5hbCBSb290IENBMFkwEwYHKoZIzj0CAQYI
        KoZIzj0DAQcDQgAEIYSIb9sazO1MO/DE8TFIpQYnlPmh+mVpe7p+lBl7gouSefd/
        SUAJd0t7xNMqWqmgnyaMiiw0TohHA3sh1YcHNKNCMEAwDgYDVR0PAQH/BAQDAgKk
        MA8GA1UdEwEB/wQFMAMBAf8wHQYDVR0OBBYEFACl2vBxhgRX0PvqGapck0sM4efd
        MAoGCCqGSM49BAMCA0kAMEYCIQCApyHzARqV3RlzFR5uIdpwyyUyGJugM89NXvWv
        bEJ7gQIhAJq5mnZKS/EJTMPYzkuq33K4g+FJp2zt+VpUkg24ETKO
        -----END CERTIFICATE-----
  rbac:
    # Group claim -> ArgoCD role mapping (Phase 33 — department RBAC).
    # policy.default: deny — unrecognised groups get no access at all.
    # Local admin account disabled (admin.enabled: false above).
    policy.default: role:''
    policy.csv: |
      g, authentik Admins, role:admin
      g, Platform Admins, role:admin
      g, Direction IT / SI, role:admin
      g, Direction Cybersécurité, role:readonly
      g, Direction Audit Interne, role:readonly
    scopes: '[groups]'

server:
  # F5 NGINX Ingress gets confused when the chart's default Service has both
  # http (port 80 -> 8080) and https (port 443 -> 8080) — duplicate
  # targetPorts make endpointslice resolution fail with "no endpointslices
  # for target port 8080". Override service to expose only the http port.
  service:
    type: ClusterIP
    servicePortHttp: 80
    servicePortHttpName: http
    servicePortHttps: 443
    servicePortHttpsName: https
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.10.0.0.200.nip.io
    # NB: do not add `nginx.org/proxy-buffer-size: "16k"` — it conflicts
    # with the default proxy_buffers config and makes nginx -s reload fail
    # with "proxy_busy_buffers_size must be less than the size of all
    # proxy_buffers minus one buffer". Keeps every Ingress in the cluster
    # broken until removed.
    annotations:
      nginx.org/redirect-to-https: "true"
    tls: true            # chart auto-creates a tls section using the secretName below
    extraTls:
      - hosts:
          - argocd.10.0.0.200.nip.io
        secretName: argocd-tls
      - hosts:
          - argocd.devandre.sbs
        secretName: argocd-tls
    extraRules:
      - host: argocd.devandre.sbs
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: argo-cd-argocd-server
                  port:
                    number: 80
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

repoServer:
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

controller:
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

applicationSet:
  resources:
    requests: { cpu: 25m,  memory: 64Mi }
    limits:   { cpu: 250m, memory: 256Mi }

# Disable Dex (no OIDC yet — Phase 15 will add Keycloak)
dex:
  enabled: false

# Disable notifications controller — Phase 21 territory
notifications:
  enabled: false

redis:
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 128Mi }
